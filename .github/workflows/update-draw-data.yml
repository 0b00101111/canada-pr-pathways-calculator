name: Update Express Entry Draw Data

on:
  schedule:
    # Run every Monday and Thursday at 14:00 UTC (morning in Canada)
    - cron: '0 14 * * 1,4'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-draws:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run update script
        run: node scripts/update-draw-data.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/draw-data.js index.html
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update Express Entry draw data from IRCC"
          git push
