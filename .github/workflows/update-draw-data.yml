name: Update Express Entry Draw Data

on:
  schedule:
    # Run every Monday and Thursday at 14:00 UTC (morning in Canada)
    - cron: '0 14 * * 1,4'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update-draws:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run update script
        id: update
        run: |
          OUTPUT=$(node scripts/update-draw-data.js 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "No new draws found"; then
            echo "has_updates=false" >> $GITHUB_OUTPUT
          else
            echo "has_updates=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.update.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'Update Express Entry draw data from IRCC'
          title: 'Update Express Entry draw data'
          body: |
            Automated update of Express Entry draw data from IRCC.

            Source: https://www.canada.ca/content/dam/ircc/documents/json/ee_rounds_4_en.json

            Please review the new draws before merging.
          branch: automated/update-draw-data
          delete-branch: true
          add-paths: |
            js/draw-data.js
            index.html
